<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>TGA Admin Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#eef3f9;
    color:#1d2b53;
    overflow:hidden;
}

/* ===============================
   TOP BAR
================================ */

.topbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    min-height:68px;
    background:linear-gradient(90deg,#001d5c,#012a7a);
    color:white;
    z-index:1000;
    display:grid;
    grid-template-columns:auto auto 1fr auto;
    align-items:center;
    gap:14px;
    padding:10px 18px;
    box-shadow:0 4px 16px rgba(0,0,0,.15);
}

.menu-btn{
    border:none;
    background:rgba(255,255,255,.14);
    color:white;
    border-radius:14px;
    width:50px;
    height:50px;
    cursor:pointer;
    font-size:22px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.brand{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo{
    width:42px;
    height:42px;
    object-fit:contain;
}

.school-name{
    font-size:13px;
    font-weight:800;
    white-space:nowrap;
}

.top-title{
    font-size:15px;
    font-weight:800;
    text-align:center;
}

.time-box{
    background:rgba(255,255,255,.10);
    border-radius:12px;
    padding:8px 14px;
    text-align:center;
    min-width:180px;
}

#liveTime{
    font-size:14px;
    font-weight:800;
}

#todayDate{
    font-size:11px;
    color:#d9e5ff;
    margin-top:3px;
}

/* ===============================
   VERTICAL MENU
================================ */

.top-menu{
    position:fixed;
    top:68px;
    left:0;
    width:320px;
    height:calc(100vh - 68px);
    background:white;
    z-index:999;
    display:none;
    padding:14px;
    box-shadow:4px 0 18px rgba(0,0,0,.14);
    overflow-y:auto;
    overflow-x:hidden;
}

.top-menu.show{
    display:block;
}

.menu-search{
    width:100%;
    padding:11px 12px;
    border:1px solid #dce4ef;
    border-radius:10px;
    font-size:12px;
    margin-bottom:12px;
    outline:none;
}

.menu-search:focus{
    border-color:#0037ad;
}

.menu-group{
    width:100%;
    margin-bottom:8px;
}

.menu-main{
    width:100%;
    border:none;
    border-radius:10px;
    padding:12px 14px;
    background:#f4f7fc;
    color:#17357a;
    font-size:12px;
    font-weight:800;
    cursor:pointer;
    text-align:left;
}

.menu-main:hover,
.menu-main.active-section{
    background:#0d47d9;
    color:white;
}

.submenu{
    display:none;
    width:100%;
    margin-top:5px;
    background:#fafcff;
    border-left:3px solid #0d47d9;
    padding:6px;
    border-radius:0 10px 10px 0;
}

.submenu.show{
    display:block;
}

.submenu button{
    width:100%;
    border:none;
    background:transparent;
    color:#17357a;
    text-align:left;
    border-radius:7px;
    padding:9px 10px;
    font-size:11.5px;
    font-weight:700;
    cursor:pointer;
    margin-bottom:3px;
}

.submenu button:hover,
.submenu button.active-item{
    background:#eef3ff;
    color:#0037ad;
}

/* ===============================
   CONTENT
================================ */

.content{
    height:100vh;
    padding-top:68px;
    overflow:auto;
    background:#eef3f9;
}

.welcome{
    min-height:calc(100vh - 68px);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:24px;
}

.welcome-logo{
    width:90px;
    height:90px;
    object-fit:contain;
    margin-bottom:18px;
}

.welcome h2{
    font-size:24px;
    color:#001d5c;
    margin-bottom:10px;
}

.welcome h4{
    max-width:760px;
    font-size:14px;
    font-weight:500;
    line-height:1.6;
    color:#475569;
    margin-bottom:8px;
}

.welcome p{
    max-width:660px;
    font-size:12.5px;
    color:#64748b;
}

/* ===============================
   IFRAME
================================ */

iframe{
    width:100%;
    height:calc(100vh - 68px);
    border:none;
    background:white;
    display:block;
}

/* ===============================
   MOBILE
================================ */

@media(max-width:768px){

    .topbar{
        min-height:150px;
        grid-template-columns:auto auto 1fr;
        align-items:center;
        gap:8px;
        padding:8px 10px;
    }

    .menu-btn{
        width:46px;
        height:46px;
        border-radius:13px;
        font-size:22px;
    }

    .brand{
        min-width:0;
        gap:8px;
    }

    .logo{
        width:38px;
        height:38px;
        flex-shrink:0;
    }

    .school-name{
        font-size:12px;
        line-height:1.2;
        white-space:normal;
    }

    .top-title{
        grid-column:1 / -1;
        font-size:13px;
        line-height:1.2;
        padding-top:2px;
        text-align:center;
    }

    .time-box{
        grid-column:1 / -1;
        width:100%;
        min-width:unset;
        padding:7px 10px;
        border-radius:12px;
    }

    #liveTime{
        font-size:14px;
    }

    #todayDate{
        font-size:11px;
    }

    .top-menu{
        top:150px;
        width:100%;
        height:calc(100vh - 150px);
        padding:10px;
    }

    .content{
        padding-top:150px;
    }

    .welcome{
        min-height:calc(100vh - 150px);
        padding:18px;
    }

    .welcome-logo{
        width:76px;
        height:76px;
    }

    .welcome h2{
        font-size:20px;
    }

    .welcome h4{
        font-size:13px;
    }

    iframe{
        height:calc(100vh - 150px);
    }
}

@media(max-width:420px){

    .topbar{
        min-height:160px;
    }

    .top-menu{
        top:160px;
        height:calc(100vh - 160px);
    }

    .content{
        padding-top:160px;
    }

    iframe{
        height:calc(100vh - 160px);
    }

    .school-name{
        font-size:11.5px;
    }
}
</style>
</head>

<body>

<header class="topbar">

    <button class="menu-btn" onclick="toggleTopMenu()">
        ☰
    </button>

    <div class="brand">
        <img src="logo.png" class="logo">

        <div>
            <div class="school-name">THE GAMBIA ACADEMY</div>
        </div>
    </div>

    <div class="top-title">
        MANAGEMENT
    </div>

    <div class="time-box">

</header>

<nav class="top-menu" id="topMenu">

            <button onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vQq0Wyx2dYpP4JJJkq5haVsu7H6pomnf5pJeP9lkQBF2mqTPdrRcopH13tP1ppYm1xgUMCJhRA2vDe_/pubhtml?widget=true&headers=false', this)">View After School Timetable</button>
            <button onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vSgEEYYIp95ZB-GvM6urkvbtxR-lxXY0pObZZhGpD0qaz6TWZBW3v7rpudiTD4u8A/pubhtml?widget=true&amp;headers=false', this)">View Visitor Register</button>

            <button onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vRSVlK3J60ZWN8wh63XA1syZO0MQgFgDBSZxeAuVKmYme9ewHp3dYGnsMizIFuXogFEhI0zRwAc42aG/pubhtml?widget=true&amp;headers=false', this)">View Finance Request</button>
            <button onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vSa6a0O9t_l-WfAensiP8Ll1nMpzW6JHcJfvcsczwQ1XfrTwt7y1x_g09-F1AX4aPpLPyQCap2mRhsH/pubhtml?widget=true&headers=false', this)">View Staff Deduction</button>
            <button onclick="loadFrame('https://docs.google.com/forms/d/e/1FAIpQLSeI4hCg187-Rn8LxPjxi63mLr2Fd7o_pOg4HIAqw0pVyXoGLw/viewform?embedded=true', this)">Record Staff Deductions</button>
            <button onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vStegrZUQ9PXOZBM2S41EJAE9_rVXd6zBKWMMe1gJsGb1JOaak9lX1ArChX4b52OKNzIQ9Wj6oOoZQz/pubhtml?widget=true&headers=false', this)">View Lunch Cost</button>
        </div>
    </div>

    <div class="menu-group">
        <button class="menu-main" onclick="toggleSubmenu('curriculum', this)">
            📚 Curriculum
        </button>

        <div class="submenu" id="curriculum">
            <button onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vQ47zw1Y0GqUfHdvwVhq51jOOryitxiPr8I2vK0akCnsW5kL76tki28NojNqdxJVChv0b_rxJS1A-cv/pubhtml?widget=true&amp;headers=false', this)">View TGA Integrated Curriculum</button>
            <button onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vQSo1vfwTXZ9N6eu8kY-Y3raNeiputuKyUuCMjBV4teclDIZrgIR2V1o-nYMc9itg/pubhtml?widget=true&amp;headers=false', this)">View Curriculum Progress Sheet</button>
            <button onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vS47HEydfMNrO6XFbZsm4fHlgHolA6mSPqm0sSG6YjeaD9y9gMXXsAYAisYsonmvot4PV1qFP9einpS/pubhtml?widget=true&headers=false', this)">View Curriculum Feedback</button>
            <button onclick="loadFrame('https://docs.google.com/forms/d/e/1FAIpQLSfVb8TYwQ1OGW_gWmwM-WvXqHpVKDG0bqOCOjwXwrzBmdNKfA/viewform?usp=header', this)">Submit Curriculum Feedback</button>
            <button onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vSvZ1FQmLICmRl1RIqX-c63nCdXM2OyB270cxtcaxS6K2_M2qpA2b7OZJbBnUImBCy-T3eb7FY2kImu/pubhtml?widget=true&headers=false', this)">View Lesson Plans S1</button>
            <button onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vQMFKnrJR7eYWD8L2I6rHOWz6Se-oJtK6e_0XY2ulrpcGJ8wxLrq6K8p-TIF7CAwrNbUWp0QwKv7CpX/pubhtml?widget=true&amp;headers=false', this)">View Lesson Plans S2</button>
            <button onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vTyET2Qtnf-GO9oSI6vLkFcfLOq8WS3aLA1Iqb9e3Xc2SJDTOVjUePsIB-XMsqYAivp9_6jRwXDOuRV/pubhtml?widget=true&amp;headers=false', this)">View Lesson Plans Jr</button>
        </div>
    </div>

    <div class="menu-group">
        <button class="menu-main" onclick="toggleSubmenu('students', this)">
            👥 Students & Classroom
        </button>

        <div class="submenu" id="students">
            <button onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vQeeJZZpj8WrnSwpxHHTybmz2OOxMFx7Cesd2rzDBfiPV8Y5V8K7VuKW-WyiSP3wCVcaMYCteQXqGlb/pubhtml?widget=true&headers=false', this)">View Disciplinary Board</button>
            <button onclick="loadFrame('https://docs.google.com/forms/d/e/1FAIpQLSdW82xzyviqfkduy-Lpm7KFR1cSbtMnPLMFm38BndUJACSs4w/viewform?embedded=true', this)">Record Disciplinary Case</button>
            <button onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vRSEoIblyrRp9ip8OVoJv5CPwf_rD3MGKTGGk4W-5fVZyfTtl8zV3qOALyJoYEMW6mV0W-W6-Rw8B8z/pubhtml?widget=true&headers=false', this)">View Routines Register</button>
            <button onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vQs6dBKKQkZlCddOURh5pB7Rwruxs4s1SJ0N6AFGyaGcI9A4qb-SU2G9LTtbFBbaJ3QcDP5MnHC1a2E/pubhtml?widget=true&amp;headers=false', this)">View Team Points</button>
            <button onclick="loadFrame('team_points.html', this)">Record Team Point</button>
            <button onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vT_rQVu_-SuUWg46u0J799YKBl-7ZvqkMAVOoawNrrpllo_KOt8D64yYGkMXatycB1-snNZ1NPysdUg/pubhtml?widget=true&headers=false', this)">View Test Scores</button>
            <button onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vQlfCFpoIyddPo_U8afJAnQBfCFYrkUrondPqq6vvSJ4pG2wFeN7FbKT11lNufuqDtEmaUzrGkj3Icb/pubhtml?widget=true&amp;headers=false', this)">View Exam Scores</button>
        </div>
    </div>

    <div class="menu-group">
        <button class="menu-main" onclick="toggleSubmenu('transport', this)">
            🚌 Transport & Logistics
        </button>

        <div class="submenu" id="transport">
            <button onclick="loadFrame('https://docs.google.com/spreadsheets/d/e/2PACX-1vTQ5cpekibewnSDqWNDnzkHwe5YZLGgFbamgW4lcbxsoj5ITCAQnaIPF3o6UgtC0PzqeGZt6paJ3EGK/pubhtml?widget=true&headers=false', this)">View Bus Maintenance</button>

<main class="content" id="content">

    <div class="welcome">
        <img src="logo.png" class="welcome-logo">

        <h2>Welcome to The Gambia Academy Management</h2>

        <h4>
            This admin portal supports transparency, accountability,
            and operational excellence across the school system.
        </h4>

        <p>
            Use the menu to manage schedules, staff, students,
            transport, finance and entries.
        </p>
    </div>

</main>

<script>
function updateDateTime(){
    const now = new Date();

    document.getElementById("liveTime").innerHTML =
    now.toLocaleTimeString("en-GB",{
        hour:"2-digit",
        minute:"2-digit",
        second:"2-digit"
    });

    document.getElementById("todayDate").innerHTML =
    now.toLocaleDateString("en-GB",{
        weekday:"long",
        day:"numeric",
        month:"long",
        year:"numeric"
    });
}

setInterval(updateDateTime,1000);
updateDateTime();

function toggleTopMenu(){
    document.getElementById("topMenu").classList.toggle("show");
}

function closeSubmenus(){
    document.querySelectorAll(".submenu").forEach(menu => {
        menu.classList.remove("show");
    });
}

function clearActive(){
    document.querySelectorAll(".menu-main").forEach(btn => {
        btn.classList.remove("active-section");
    });

    document.querySelectorAll(".submenu button").forEach(btn => {
        btn.classList.remove("active-item");
    });
}

function setActiveSection(button){
    clearActive();

    if(button){
        button.classList.add("active-section");
    }
}

function toggleSubmenu(id, button){
    const menu = document.getElementById(id);
    const open = menu.classList.contains("show");

    closeSubmenus();
    setActiveSection(button);

    if(!open){
        menu.classList.add("show");
    }
}

function loadFrame(url, button){
    if(button){
        clearActive();

        button.classList.add("active-item");

        const parentMain =
        button
        .closest(".menu-group")
        .querySelector(".menu-main");

        if(parentMain){
            parentMain.classList.add("active-section");
        }
    }

    document.getElementById("topMenu").classList.remove("show");

    document.getElementById("content").innerHTML = `
        <iframe src="${url}"></iframe>
    `;
}

function goBack(){
    closeSubmenus();

    document.getElementById("topMenu").classList.remove("show");

    clearActive();

    const dashboard =
    document.querySelector(".menu-main");

    if(dashboard){
        dashboard.classList.add("active-section");
    }

    document.getElementById("content").innerHTML = `
        <div class="welcome">
            <img src="logo.png" class="welcome-logo">
            <h2>Welcome Back</h2>
            <p>Select a menu item to continue navigating the system.</p>
        </div>
    `;
}

function filterMenu(){

    const search =
    document.getElementById("menuSearch")
    .value
    .toLowerCase()
    .trim();

    const groups =
    document.querySelectorAll(".menu-group");

    groups.forEach(group => {

        const submenu =
        group.querySelector(".submenu");

        if(!submenu){

            const text =
            group.innerText.toLowerCase();

            group.style.display =
            search === "" || text.includes(search)
            ? "block"
            : "none";

            return;
        }

        let foundMatch =
        false;

        submenu
        .querySelectorAll("button")
        .forEach(item => {

            const text =
            item.innerText.toLowerCase();

            if(
                search === "" ||
                text.includes(search)
            ){

                item.style.display =
                "block";

                foundMatch =
                true;

            }else{

                item.style.display =
                "none";
            }

        });

        if(search === ""){

            group.style.display =
            "block";

            submenu.classList.remove("show");

        }else{

            group.style.display =
            foundMatch ? "block" : "none";

            if(foundMatch){
                submenu.classList.add("show");
            }
        }
    });
}

function logout(){
    window.location.href = "index.html";
}

document.addEventListener("click", function(event){
    const topMenu = document.getElementById("topMenu");
    const menuBtn = document.querySelector(".menu-btn");

    if(
        !topMenu.contains(event.target) &&
        !menuBtn.contains(event.target)
    ){
        closeSubmenus();
    }
});
</script>

</body>
</html>
