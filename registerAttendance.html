<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Attendance Register</title>

<style>

/* =====================================
   GLOBAL RESET
===================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* =====================================
   BODY
===================================== */

body{
    font-family:Arial,sans-serif;
    background:#eef3f9;
    color:#1d2b53;
}

/* =====================================
   MAIN PAGE
===================================== */

.container{
    width:100%;
    min-height:100vh;
    background:white;
    padding:24px;
}

h2{
    font-size:18px;
    color:#17357a;
    margin-bottom:8px;
}

.legend{
    margin-bottom:18px;
    color:#555;
    font-size:13px;
    line-height:1.5;
}

/* =====================================
   MAIN BUTTONS
===================================== */

.main-buttons{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:20px;
}

button{
    border:none;
    border-radius:10px;
    padding:10px 14px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    transition:.25s;
    color:white;
}

button:hover{
    transform:translateY(-1px);
}

.student-btn,
.save-btn{
    background:linear-gradient(90deg,#0048d8,#0037ad);
}

.staff-btn{
    background:linear-gradient(90deg,#17357a,#001d5c);
}

.clear-btn{
    background:linear-gradient(
        90deg,
        #d62828,
        #b00020
    );
}

.close-btn-bottom{
    background:#6c757d;
}

.close-btn-bottom:hover{
    background:#5a6268;
}

/* =====================================
   FORM FIELDS
===================================== */

.field{
    margin-bottom:14px;
    width:100%;
    max-width:220px;
}

label{
    display:block;
    margin-bottom:5px;
    font-size:12px;
    font-weight:700;
    color:#17357a;
}

input{
    width:100%;
    padding:8px 9px;
    border-radius:10px;
    border:1px solid #dce4ef;
    font-size:12px;
    outline:none;
}

input:focus{
    border:1px solid #0037ad;
}

/* =====================================
   MODAL
===================================== */

.modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    display:none;
    justify-content:center;
    align-items:flex-start;
    overflow-y:auto;
    padding:18px;
    z-index:999;
}

.modal{
    width:92%;
    max-width:600px;
    background:white;
    border-radius:16px;
    padding:14px 16px;
}

/* =====================================
   MODAL HEADER
===================================== */

.modal-header{
    margin-bottom:12px;
}

.modal-title{
    font-size:18px;
    color:#17357a;
}

/* =====================================
   TABLE
===================================== */

.table-wrapper{
    width:100%;
    max-width:600px;
    margin:12px auto 0 auto;
}

table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
    background:white;
}

thead{
    background:linear-gradient(
        90deg,
        #17357a,
        #001d5c
    );

    color:white;
}

th{
    padding:10px;
    text-align:left;
    font-size:12px;
    font-weight:700;
}

td{
    padding:8px 10px;
    border-bottom:1px solid #eef2f7;
    font-size:12px;
    word-wrap:break-word;
}

tbody tr:nth-child(even){
    background:#f8fbff;
}

tbody tr:hover{
    background:#eef6ff;
}

/* =====================================
   RESPONSIVE TABLE COLUMNS
===================================== */

th:nth-child(1),
td:nth-child(1){
    width:18%;
}

th:nth-child(2),
td:nth-child(2){
    width:34%;
}

th:nth-child(3),
td:nth-child(3){
    width:24%;
}

th:nth-child(4),
td:nth-child(4){
    width:24%;
}

/* =====================================
   DROPDOWN
===================================== */

select{
    width:100%;
    padding:6px 8px;
    border-radius:7px;
    border:1px solid #dbe3ef;
    font-size:12px;
    background:white;
    outline:none;
}

select:focus{
    border:1px solid #0037ad;
}

/* =====================================
   ACTION BUTTONS
===================================== */

.buttons{
    margin-top:14px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

#message{
    margin-top:12px;
    font-size:12px;
    font-weight:700;
}

/* =====================================
   TABLET
===================================== */

@media(max-width:992px){
    .modal{
        width:100%;
        max-width:100%;
    }

    .table-wrapper{
        max-width:100%;
    }
    .modal{
        max-width:100%;
    }

    th,
    td{
        font-size:11px;
        padding:7px;
    }
}

/* =====================================
   MOBILE
===================================== */

@media(max-width:768px){

    .container{
        padding:16px;
    }

    .modal{
        padding:14px;
        border-radius:14px;
    }

    .main-buttons,
    .buttons{
        flex-direction:column;
    }

    button{
        width:100%;
    }

    .field{
        max-width:100%;
    }

    table{
        table-layout:auto;
    }

    th,
    td{
        font-size:10.5px;
        padding:6px;
    }
}

</style>

</head>

<body>

<div class="container">

    <h2>Mark Register</h2>

    <p class="legend">
        P = Present<br>AA = Authorised Absence<br>UA = Unauthorised Absence
    </p>

    <div class="main-buttons">

        <button
            class="staff-btn"
            onclick="openRegister('staff')">

            + Staff Register

        </button>

        <button
            class="student-btn"
            onclick="openRegister('student')">

            + Student Register

        </button>

    </div>

</div>

<div class="modal-overlay" id="modalOverlay">

    <div class="modal">

        <div class="modal-header">

            <h2
                class="modal-title"
                id="modalTitle">
                Mark Register
            </h2>
            <p>
                P = Present, AA = Authorised Absence, UA = Unauthorised Absence
            </p>
        </div>

        <div class="field">

            <label>Register Date</label>

            <input
                type="date"
                id="date">

        </div>

        <div class="table-wrapper">

            <table>

                <thead id="tableHead"></thead>

                <tbody id="attendanceTable"></tbody>

            </table>

        </div>

        <div class="buttons">

            <button
                class="save-btn"
                id="saveBtn"
                onclick="saveAttendance()">

                Submit

            </button>

            <button
                class="clear-btn"
                onclick="clearForm()">

                Clear

            </button>

            <button
                class="close-btn-bottom"
                onclick="closeModal()">

                Close

            </button>

        </div>

        <div id="message"></div>

    </div>

</div>

<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbx70aP3mQ7QHnIeDU1vhdckv2UAo7T5F8U9GOgxY1fW8fxKDMFEEjR0P77v8NT90ulE/exec";

let currentRegisterType = "";

/* =====================================
   OPEN REGISTER
===================================== */

function openRegister(type){

    currentRegisterType = type;

    document.getElementById(
        "modalOverlay"
    ).style.display = "flex";

    document.getElementById(
        "date"
    ).value =
    new Date()
    .toISOString()
    .split("T")[0];

    document.getElementById(
        "message"
    ).innerText = "";

    if(type === "student"){

        document.getElementById(
            "modalTitle"
        ).innerText =
        "Mark Student Register";

        loadStudents();
    }

    if(type === "staff"){

        document.getElementById(
            "modalTitle"
        ).innerText =
        "Mark Staff Register";

        loadStaff();
    }
}

/* =====================================
   CLOSE MODAL
===================================== */

function closeModal(){

    document.getElementById(
        "modalOverlay"
    ).style.display = "none";

    document.getElementById(
        "attendanceTable"
    ).innerHTML = "";

    document.getElementById(
        "message"
    ).innerText = "";
}

/* =====================================
   LOAD STUDENTS
===================================== */

async function loadStudents(){

    const response =
    await fetch(
        WEB_APP_URL +
        "?action=getStudents"
    );

    const result =
    await response.json();

    const tableHead =
    document.getElementById(
        "tableHead"
    );

    const tbody =
    document.getElementById(
        "attendanceTable"
    );

    tableHead.innerHTML = `
        <tr>
            <th>Student ID</th>
            <th>Student Name</th>
            <th>Class</th>
            <th>Attendance</th>
        </tr>
    `;

    tbody.innerHTML = "";

    result.data.forEach(student => {

        tbody.innerHTML += `
            <tr>

                <td>${student.studentID}</td>

                <td>${student.studentName}</td>

                <td>${student.className}</td>

                <td>
                    <select>
                        <option value="P">P</option>
                        <option value="AA">AA</option>
                        <option value="UA">UA</option>
                    </select>
                </td>

            </tr>
        `;
    });
}

/* =====================================
   LOAD STAFF
===================================== */

async function loadStaff(){

    const response =
    await fetch(
        WEB_APP_URL +
        "?action=getStaff"
    );

    const result =
    await response.json();

    const tableHead =
    document.getElementById(
        "tableHead"
    );

    const tbody =
    document.getElementById(
        "attendanceTable"
    );

    tableHead.innerHTML = `
        <tr>
            <th>Staff ID</th>
            <th>Staff Name</th>
            <th>Role</th>
            <th>Attendance</th>
        </tr>
    `;

    tbody.innerHTML = "";

    result.data.forEach(staff => {

        tbody.innerHTML += `
            <tr>

                <td>${staff.staffID}</td>

                <td>${staff.staffName}</td>

                <td>${staff.role}</td>

                <td>
                    <select>
                        <option value="P">P</option>
                        <option value="AA">AA</option>
                        <option value="UA">UA</option>
                    </select>
                </td>

            </tr>
        `;
    });
}

/* =====================================
   CLEAR FORM
===================================== */

function clearForm(){

    document
    .querySelectorAll("select")
    .forEach(select => {

        select.value = "P";
    });

    document.getElementById(
        "message"
    ).innerText = "";
}

/* =====================================
   SAVE ATTENDANCE
===================================== */

function saveAttendance(){

    if(currentRegisterType === "student"){
        saveStudentAttendance();
    }

    if(currentRegisterType === "staff"){
        saveStaffAttendance();
    }
}

</script>

</body>
