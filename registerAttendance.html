<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attendance Register</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#eef3f9;
    color:#1d2b53;
}

.container{
    width:100%;
    min-height:100vh;
    background:white;
    padding:24px;
}

h2{
    font-size:18px;
    color:#17357a;
    margin-bottom:8px;
}

.legend{
    margin-bottom:18px;
    color:#555;
    font-size:13px;
    line-height:1.5;
}

.main-buttons{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:20px;
}

button{
    border:none;
    border-radius:10px;
    padding:10px 14px;
    font-size:13px;
    font-weight:700;
    cursor:pointer;
    transition:.25s;
    color:white;
}

button:hover{
    transform:translateY(-1px);
}

button:disabled{
    opacity:.6;
    cursor:not-allowed;
    transform:none;
}

.student-btn,
.save-btn{
    background:linear-gradient(90deg,#0048d8,#0037ad);
}

.staff-btn{
    background:linear-gradient(90deg,#17357a,#001d5c);
}

.clear-btn{
    background:linear-gradient(90deg,#d62828,#b00020);
}

.close-btn-bottom{
    background:#6c757d;
}

.field{
    margin-bottom:14px;
    width:100%;
    max-width:220px;
}

label{
    display:block;
    margin-bottom:5px;
    font-size:12px;
    font-weight:700;
    color:#17357a;
}

input{
    width:100%;
    padding:8px 9px;
    border-radius:10px;
    border:1px solid #dce4ef;
    font-size:12px;
    outline:none;
}

input:focus{
    border:1px solid #0037ad;
}

.modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
    display:none;
    justify-content:center;
    align-items:flex-start;
    overflow-y:auto;
    padding:18px;
    z-index:999;
}

.modal{
    width:92%;
    max-width:700px;
    background:white;
    border-radius:16px;
    padding:14px 16px;
}

.modal-header{
    margin-bottom:12px;
}

.modal-title{
    font-size:18px;
    color:#17357a;
}

.modal-header p{
    font-size:12px;
    color:#555;
}

.table-wrapper{
    width:100%;
    margin:12px auto 0 auto;
}

table{
    width:100%;
    border-collapse:collapse;
    table-layout:fixed;
    background:white;
}

thead{
    background:linear-gradient(90deg,#17357a,#001d5c);
    color:white;
}

th{
    padding:10px;
    text-align:left;
    font-size:12px;
    font-weight:700;
}

td{
    padding:8px 10px;
    border-bottom:1px solid #eef2f7;
    font-size:12px;
    word-wrap:break-word;
}

tbody tr:nth-child(even){
    background:#f8fbff;
}

tbody tr:hover{
    background:#eef6ff;
}

th:nth-child(1),
td:nth-child(1){
    width:18%;
}

th:nth-child(2),
td:nth-child(2){
    width:34%;
}

th:nth-child(3),
td:nth-child(3){
    width:24%;
}

th:nth-child(4),
td:nth-child(4){
    width:24%;
}

select{
    width:100%;
    padding:6px 8px;
    border-radius:7px;
    border:1px solid #dbe3ef;
    font-size:12px;
    background:white;
    outline:none;
}

select:focus{
    border:1px solid #0037ad;
}

.buttons{
    margin-top:14px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.buttons button{
    flex:1;
    min-width:130px;
}

#message{
    margin-top:12px;
    font-size:12px;
    font-weight:700;
}

@media(max-width:992px){
    .modal{
        width:100%;
        max-width:100%;
    }

    th,
    td{
        font-size:11px;
        padding:7px;
    }
}

@media(max-width:768px){

    .container{
        padding:16px;
    }

    .modal{
        padding:14px;
        border-radius:14px;
    }

    .main-buttons,
    .buttons{
        flex-direction:column;
    }

    button{
        width:100%;
    }

    .field{
        max-width:100%;
    }

    table{
        table-layout:fixed;
    }

    th,
    td{
        font-size:10.5px;
        padding:6px;
    }

    select{
        font-size:11px;
        padding:5px;
    }
}
</style>

</head>

<body>

<div class="container">

    <h2>Mark Register</h2>

    <p class="legend">
        P = Present<br>
        AA = Authorised Absence<br>
        UA = Unauthorised Absence<br>
        S = Sick
    </p>

    <div class="main-buttons">

        <button class="staff-btn" onclick="openRegister('staff')">
            + Staff Register
        </button>

        <button class="student-btn" onclick="openRegister('student')">
            + Student Register
        </button>

    </div>

</div>

<div class="modal-overlay" id="modalOverlay">

    <div class="modal">

        <div class="modal-header">

            <h2 class="modal-title" id="modalTitle">
                Mark Register
            </h2>

            <p>
                P = Present, AA = Authorised Absence, UA = Unauthorised Absence, S = Sick
            </p>

        </div>

        <div class="field">

            <label>Register Date</label>

            <input type="date" id="date">

        </div>

        <div class="table-wrapper">

            <table>

                <thead id="tableHead"></thead>

                <tbody id="attendanceTable"></tbody>

            </table>

        </div>

        <div class="buttons">

            <button class="save-btn" id="saveBtn" onclick="saveAttendance()">
                Submit
            </button>

            <button class="clear-btn" onclick="clearForm()">
                Clear
            </button>

            <button class="close-btn-bottom" onclick="closeModal()">
                Close
            </button>

        </div>

        <div id="message"></div>

    </div>

</div>

<script>
const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbyTZqMJJ_i2D1D1hKogYHtxJj37pQnnHp36LkEDEwkNBQEd19uPwrcK8-kwryXPZMYo/exec";

let currentRegisterType = "";

function openRegister(type){

    currentRegisterType = type;

    document.getElementById("modalOverlay").style.display = "flex";

    document.getElementById("date").value =
    new Date().toISOString().split("T")[0];

    document.getElementById("message").innerText = "";

    document.getElementById("saveBtn").disabled = false;
    document.getElementById("saveBtn").style.opacity = "1";

    if(type === "student"){

        document.getElementById("modalTitle").innerText =
        "Mark Student Register";

        loadStudents();
    }

    if(type === "staff"){

        document.getElementById("modalTitle").innerText =
        "Mark Staff Register";

        loadStaff();
    }
}

function closeModal(){

    document.getElementById("modalOverlay").style.display = "none";
    document.getElementById("attendanceTable").innerHTML = "";
    document.getElementById("tableHead").innerHTML = "";
    document.getElementById("message").innerText = "";

    currentRegisterType = "";
}

async function loadStudents(){

    const tableHead = document.getElementById("tableHead");
    const tbody = document.getElementById("attendanceTable");
    const message = document.getElementById("message");

    tableHead.innerHTML = `
        <tr>
            <th>Student ID</th>
            <th>Student Name</th>
            <th>Class</th>
            <th>Attendance</th>
        </tr>
    `;

    tbody.innerHTML = "";
    message.style.color = "#0037ad";
    message.innerText = "Loading students...";

    try{

        const response =
        await fetch(WEB_APP_URL + "?action=getStudents");

        const result =
        await response.json();

        if(result.status !== "SUCCESS"){

            message.style.color = "red";
            message.innerText =
            result.message || "Failed to load students";

            return;
        }

        if(!Array.isArray(result.data) || result.data.length === 0){

            message.style.color = "red";
            message.innerText = "No student found";

            return;
        }

        result.data.forEach(student => {

            tbody.innerHTML += `
                <tr>
                    <td>${student.studentID}</td>
                    <td>${student.studentName}</td>
                    <td>${student.className}</td>
                    <td>
                        <select>
                            <option value="P">P</option>
                            <option value="AA">AA</option>
                            <option value="UA">UA</option>
                            <option value="S">S</option>
                        </select>
                    </td>
                </tr>
            `;
        });

        message.innerText = "";

    }catch(error){

        message.style.color = "red";
        message.innerText = "Failed to load students";

        console.error(error);
    }
}

async function loadStaff(){

    const tableHead = document.getElementById("tableHead");
    const tbody = document.getElementById("attendanceTable");
    const message = document.getElementById("message");

    tableHead.innerHTML = `
        <tr>
            <th>Staff ID</th>
            <th>Staff Name</th>
            <th>Role</th>
            <th>Attendance</th>
        </tr>
    `;

    tbody.innerHTML = "";
    message.style.color = "#0037ad";
    message.innerText = "Loading staff...";

    try{

        const response =
        await fetch(WEB_APP_URL + "?action=getStaff");

        const result =
        await response.json();

        if(result.status !== "SUCCESS"){

            message.style.color = "red";
            message.innerText =
            result.message || "Failed to load staff";

            return;
        }

        if(!Array.isArray(result.data) || result.data.length === 0){

            message.style.color = "red";
            message.innerText = "No staff found";

            return;
        }

        result.data.forEach(staff => {

            tbody.innerHTML += `
                <tr>
                    <td>${staff.staffID}</td>
                    <td>${staff.staffName}</td>
                    <td>${staff.role}</td>
                    <td>
                        <select>
                                <option value="P">P</option>
                                <option value="AA">AA</option>
                                <option value="UA">UA</option>
                                <option value="S">S</option>
                        </select>
                    </td>
                </tr>
            `;
        });

        message.innerText = "";

    }catch(error){

        message.style.color = "red";
        message.innerText = "Failed to load staff";

        console.error(error);
    }
}

function clearForm(){

    document
    .querySelectorAll("#attendanceTable select")
    .forEach(select => {
        select.value = "P";
    });

    document.getElementById("message").innerText = "";

    document.getElementById("saveBtn").disabled = false;
    document.getElementById("saveBtn").style.opacity = "1";
}

function saveAttendance(){

    if(currentRegisterType === "student"){
        saveStudentAttendance();
        return;
    }

    if(currentRegisterType === "staff"){
        saveStaffAttendance();
        return;
    }

    const message = document.getElementById("message");
    message.style.color = "red";
    message.innerText = "Select student or staff register first";
}

async function saveStudentAttendance(){

    const date = document.getElementById("date").value;
    const rows = document.querySelectorAll("#attendanceTable tr");
    const message = document.getElementById("message");

    if(!date){

        message.style.color = "red";
        message.innerText = "Please select register date";

        return;
    }

    const data = [];

    rows.forEach(row => {

        data.push({
            date: date,
            studentID: row.cells[0].innerText.trim(),
            studentName: row.cells[1].innerText.trim(),
            className: row.cells[2].innerText.trim(),
            attendance: row.querySelector("select").value
        });

    });

    if(data.length === 0){

        message.style.color = "red";
        message.innerText = "No student data found";

        return;
    }

    await submitAttendance(
        "saveStudentAttendance",
        data,
        "Student register submitted successfully"
    );
}

async function saveStaffAttendance(){

    const date = document.getElementById("date").value;
    const rows = document.querySelectorAll("#attendanceTable tr");
    const message = document.getElementById("message");

    if(!date){

        message.style.color = "red";
        message.innerText = "Please select register date";

        return;
    }

    const data = [];

    rows.forEach(row => {

        data.push({
            date: date,
            staffID: row.cells[0].innerText.trim(),
            staffName: row.cells[1].innerText.trim(),
            role: row.cells[2].innerText.trim(),
            attendance: row.querySelector("select").value
        });

    });

    if(data.length === 0){

        message.style.color = "red";
        message.innerText = "No staff data found";

        return;
    }

    await submitAttendance(
        "saveStaffAttendance",
        data,
        "Staff register submitted successfully"
    );
}

async function submitAttendance(action, data, successText){

    const message = document.getElementById("message");
    const saveBtn = document.getElementById("saveBtn");

    saveBtn.disabled = true;
    saveBtn.style.opacity = "0.6";

    message.style.color = "#0037ad";
    message.innerText = "Submitting register...";

    try{

        const response =
        await fetch(WEB_APP_URL, {

            method:"POST",

            headers:{
                "Content-Type":"text/plain;charset=utf-8"
            },

            body:JSON.stringify({
                action:action,
                data:data
            })
        });

        const result =
        await response.json();

        if(result.status === "SUCCESS"){

            message.style.color = "green";
            message.innerText = successText;

            saveBtn.disabled = true;
            saveBtn.style.opacity = "0.6";

            return;
        }

        if(result.status === "DUPLICATE"){

            message.style.color = "red";
            message.innerText =
            result.message || "Register already marked";

            saveBtn.disabled = true;
            saveBtn.style.opacity = "0.6";

            return;
        }

        message.style.color = "red";
        message.innerText =
        result.message || "Failed to save register";

        saveBtn.disabled = false;
        saveBtn.style.opacity = "1";

    }catch(error){

        message.style.color = "red";
        message.innerText = "Failed to submit register";

        saveBtn.disabled = false;
        saveBtn.style.opacity = "1";

        console.error(error);
    }
}
</script>

</body>
</html>
